<!DOCTYPE HTML>
<html>
<head>
<meta charset="UTF-8">
<title>Known SteamIDs</title>
<style type="text/css" media="screen">
	body {
		background:#1B2838;
		color:#FFFFFF;
		font-family: Arial, Helvetica, Verdana, sans-serif;
	}
	
	#SteamIDs td { background:#354F6D; padding:10px 30px; }
	#SteamIDs tr:hover td { background:#5488AA; }
	a { color:#FFFFFF; text-decoration:none; }
	a:visited { color:#AAAAAA; }
	
</style>
<script type="text/javascript" charset="utf-8">
	function SteamID( id, name ) {
		this.id = id;
		this.name = name;
	}
	
	var SteamIDs = [
// write here: new SteamID( id, name )
	];
	
	function fillContent( sortFcn ) {
		var table = document.getElementById("SteamIDs");
		if (table) {
			table.innerHTML = "";
			var arr = SteamIDs;
			if (sortFcn) {
				arr = SteamIDs.map(function(a){return a;});
				arr.sort(sortFcn);
			}
			for (var i=0; i<arr.length; i++) {
				var SteamID = arr[i];
				var tr = table.appendChild(document.createElement('tr'));
				var td1 = tr.appendChild(document.createElement('td'));
				var td2 = tr.appendChild(document.createElement('td'));
				var a1 = td1.appendChild(document.createElement('a'));
				var a2 = td2.appendChild(document.createElement('a'));
				a1.appendChild(document.createTextNode(SteamID.id));
				a2.appendChild(document.createTextNode(SteamID.name));
				a1.href = "https://steamcommunity.com/profiles/"+SteamID.id;
				a2.href = "https://steamcommunity.com/profiles/"+SteamID.id;
				a1.target = "_blank";
				a2.target = "_blank";
			}
		}
	}
	
	function sortByID( a,b ) {
		if (a.id < b.id) return -1;
		if (a.id > b.id) return +1;
		var nameA = a.name.toLowerCase();
		var nameB = b.name.toLowerCase();
		if (nameA < nameB) return -1;
		if (nameA > nameB) return +1;
		return 0;
	}
	
	function sortByName( a,b ) {
		var nameA = a.name.toLowerCase();
		var nameB = b.name.toLowerCase();
		if (nameA < nameB) return -1;
		if (nameA > nameB) return +1;
		if (a.id < b.id) return -1;
		if (a.id > b.id) return +1;
		return 0;
	}
	
	window.addEventListener('load', function() { fillContent(); });
</script>
</head>
<body>
	<input type="button" value="unsorted"       onclick="fillContent();"></input>
	<input type="button" value="sorted by ID"   onclick="fillContent( sortByID );"></input>
	<input type="button" value="sorted by name" onclick="fillContent( sortByName );"></input>
	<table id="SteamIDs"></table>
</body>
</html>
